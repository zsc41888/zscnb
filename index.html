<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZSC主网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 5vh;
            background: linear-gradient(135deg, #0a192f 0%, #1e3c72 100%);
            font-family: 'Arial', sans-serif;
            padding-left: 10px;
            padding-right: 10px;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 粒子背景容器 */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }
        
        /* 内容容器，确保内容在粒子之上 */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeInUp 1.2s ease-out forwards;
            animation-delay: 0.5s;
        }
        
        .welcome-text {
            font-size: clamp(1.8rem, 7vw, 3rem);
            font-weight: bold;
            background: linear-gradient(
                90deg,
                #4a8fe7,
                #1e3c72,
                #4a8fe7,
                #1e3c72,
                #4a8fe7
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: 
                colorFlow 3s linear infinite,
                subtleScale 2s ease-in-out infinite,
                glowEffect 4s ease-in-out infinite;
            white-space: nowrap;
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 15px 0;
            text-shadow: 0 0 10px rgba(74, 143, 231, 0.5);
            margin-bottom: 40px;
            position: relative;
            transition: transform 0.3s ease;
        }
        
        .welcome-text:hover {
            transform: translateY(-5px);
        }
        
        /* 增强颜色流动动画 */
        @keyframes colorFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        /* 缩放动画 */
        @keyframes subtleScale {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }
        
        /* 发光效果 */
        @keyframes glowEffect {
            0%, 100% {
                text-shadow: 0 0 10px rgba(74, 143, 231, 0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(74, 143, 231, 0.8), 0 0 30px rgba(74, 143, 231, 0.6);
            }
        }
        
        /* 五子棋框样式 */
        .gobang-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            animation: slideInUp 1s ease-out forwards;
            animation-delay: 0.7s;
            opacity: 0;
            transform: translateY(30px);
        }
        
        .gobang-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.7s ease;
        }
        
        .gobang-box:hover::before {
            left: 100%;
        }
        
        .gobang-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .gobang-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #4a8fe7;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(74, 143, 231, 0.3);
            transition: all 0.3s ease;
        }
        
        .gobang-box:hover .gobang-title {
            text-shadow: 0 0 15px rgba(74, 143, 231, 0.6);
        }
        
        .gobang-button {
            background: linear-gradient(135deg, #4a8fe7 0%, #1e3c72 100%);
            border: none;
            border-radius: 50px;
            color: white;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(74, 143, 231, 0.4);
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }
        
        .gobang-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .gobang-button:hover::before {
            left: 100%;
        }
        
        .gobang-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(74, 143, 231, 0.6);
        }
        
        .gobang-button:active {
            transform: translateY(1px) scale(0.98);
        }
        
        /* 页面加载动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 移动端特定样式 */
        @media (max-width: 480px) {
            body {
                padding-top: 3vh;
                padding-left: 15px;
                padding-right: 15px;
            }
            
            .welcome-text {
                font-size: clamp(1.5rem, 8vw, 2.2rem);
                white-space: normal;
                line-height: 1.3;
            }
            
            .gobang-box {
                width: 95%;
                padding: 20px;
            }
            
            .gobang-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 粒子背景容器 -->
    <div id="particles-js"></div>
    
    <!-- 内容容器 -->
    <div class="content">
        <h1 class="welcome-text">欢迎访问ZSC主网站</h1>
        
        <div class="gobang-box">
            <div class="gobang-title">ZSC3D五子棋</div>
            <a href="https://zsc41888.github.io/zscqi/" target="_blank" class="gobang-button">进入游戏</a>
        </div>
    </div>

    <!-- 粒子动画库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // 初始化粒子背景
        document.addEventListener('DOMContentLoaded', function() {
            particlesJS('particles-js', {
                particles: {
                    number: {
                        value: 80,
                        density: {
                            enable: true,
                            value_area: 800
                        }
                    },
                    color: {
                        value: '#4a8fe7'
                    },
                    shape: {
                        type: 'circle',
                        stroke: {
                            width: 0,
                            color: '#000000'
                        },
                        polygon: {
                            nb_sides: 5
                        }
                    },
                    opacity: {
                        value: 0.5,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 1,
                            opacity_min: 0.1,
                            sync: false
                        }
                    },
                    size: {
                        value: 3,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 2,
                            size_min: 0.1,
                            sync: false
                        }
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: '#4a8fe7',
                        opacity: 0.4,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 2,
                        direction: 'none',
                        random: true,
                        straight: false,
                        out_mode: 'out',
                        bounce: false,
                        attract: {
                            enable: false,
                            rotateX: 600,
                            rotateY: 1200
                        }
                    }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: {
                        onhover: {
                            enable: true,
                            mode: 'repulse'
                        },
                        onclick: {
                            enable: true,
                            mode: 'push'
                        },
                        resize: true
                    },
                    modes: {
                        grab: {
                            distance: 400,
                            line_linked: {
                                opacity: 1
                            }
                        },
                        bubble: {
                            distance: 400,
                            size: 40,
                            duration: 2,
                            opacity: 8,
                            speed: 3
                        },
                        repulse: {
                            distance: 100,
                            duration: 0.4
                        },
                        push: {
                            particles_nb: 4
                        },
                        remove: {
                            particles_nb: 2
                        }
                    }
                },
                retina_detect: true
            });
            
            // 移除自动刷新功能，改为使用更流畅的动画
            if (sessionStorage.getItem('hasRefreshed')) {
                // 如果已经刷新过，添加一个特殊的进入动画
                document.querySelector('.content').style.animation = 'fadeInUp 0.8s ease-out forwards';
            } else {
                sessionStorage.setItem('hasRefreshed', 'true');
            }
            
            // 原有的交互效果
            document.querySelector('.gobang-button').addEventListener('mouseenter', function() {
                this.style.background = 'linear-gradient(135deg, #5a9ff7 0%, #2a4c82 100%)';
            });
            
            document.querySelector('.gobang-button').addEventListener('mouseleave', function() {
                this.style.background = 'linear-gradient(135deg, #4a8fe7 0%, #1e3c72 100%)';
            });
        });
    </script>
</body>
</html>
